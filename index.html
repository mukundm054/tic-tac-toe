<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link href="index.css" rel="stylesheet">
  </head>
  <body>
    <header>
      <img src="logo.png" alt="logo" class="logo" />
      <button id="btn" class="btn">Restart</button>
    </header>
    <main>
      <section>
        <article>
          <h1 class="title">Tic Tac Toe</h1>
          <p class="des">
            This is a simple Tic Tac Toe game built using HTML, CSS, and
            JavaScript. Play against your friend and enjoy a classic strategy
            game.
          </p>
        </article>
        <div class="grid-board">
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>

          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>

          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
        </div>
      </section>
    </main>
    <script src="index.js"></script>
  </body>
</html>
